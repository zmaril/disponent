# straitjacket-allow-file[:duplication] — per-job `needs:`/`if:` gating and the
# shared checkout/toolchain/cache setup necessarily repeat across jobs in Actions YAML
name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 2"  # weekly: catch toolchain/dep drift even without a push

jobs:
  # Fan-out: decide whether a PR actually touches anything the build depends
  # on. A docs-only PR skips the heavy compile/codegen/node jobs below — and a
  # skipped required check still reports green, so branch protection stays happy.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'crates/**'
              - 'src/**'
              - 'schema/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.cargo/**'
              - '.github/workflows/ci.yml'

  rust:
    name: rust engine + backends
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # the local-backend integration tests drive a real tmux server
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq tmux
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  codegen:
    name: codegen freshness (fluessig pin)
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: regenerate everything, fail on drift
        env:
          # The schema tool lives in its own repo; pin the SHA disponent
          # generates against (KEEP IN LOCKSTEP with the fluessig `rev` in
          # crates/disponent-core/Cargo.toml — one tool, one version).
          FLUESSIG_REF: 15a2e1deaf122ebfdb6b6d392f59c111729397c1
        run: |
          # Clone into RUNNER_TEMP (outside the workspace) so it can't register
          # as drift in the git-clean check below. Fetch the pinned SHA directly
          # (clone --branch takes refs, not SHAs).
          git init -q "$RUNNER_TEMP/fluessig"
          git -C "$RUNNER_TEMP/fluessig" fetch -q --depth 1 \
            https://github.com/zmaril/fluessig "$FLUESSIG_REF"
          git -C "$RUNNER_TEMP/fluessig" checkout -q FETCH_HEAD
          FLUESSIG_DIR="$RUNNER_TEMP/fluessig" scripts/gen.sh
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::generated artifacts are stale — run scripts/gen.sh and commit"
            git status --porcelain
            git diff | head -200
            exit 1
          fi

  node:
    name: node binding
    needs: changes
    if: needs.changes.outputs.code == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - name: build the napi addon + test
        working-directory: crates/disponent-node
        run: |
          bun install
          bun run build
          bun run test
