name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 2"  # weekly: catch toolchain/dep drift even without a push

jobs:
  rust:
    name: rust engine + backends
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # the local-backend integration tests drive a real tmux server
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq tmux
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  codegen:
    name: codegen freshness (fluessig pin)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: regenerate everything, fail on drift
        env:
          # The schema tool lives in its own repo; pin the SHA disponent
          # generates against (KEEP IN LOCKSTEP with the fluessig `rev` in
          # crates/disponent-core/Cargo.toml — one tool, one version).
          FLUESSIG_REF: 0ee9d4672987d7c8a8762993d13860af7e25973e
        run: |
          # Clone into RUNNER_TEMP (outside the workspace) so it can't register
          # as drift in the git-clean check below. Fetch the pinned SHA directly
          # (clone --branch takes refs, not SHAs).
          git init -q "$RUNNER_TEMP/fluessig"
          git -C "$RUNNER_TEMP/fluessig" fetch -q --depth 1 \
            https://github.com/zmaril/fluessig "$FLUESSIG_REF"
          git -C "$RUNNER_TEMP/fluessig" checkout -q FETCH_HEAD
          FLUESSIG_DIR="$RUNNER_TEMP/fluessig" scripts/gen.sh
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::generated artifacts are stale — run scripts/gen.sh and commit"
            git status --porcelain
            git diff | head -200
            exit 1
          fi

  node:
    name: node binding
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - name: build the napi addon + test
        working-directory: crates/disponent-node
        run: |
          bun install
          bun run build
          bun run test

  python:
    name: python binding
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # deps live once in pyproject's [dependency-groups] (needs pip >= 25.1);
      # the dry-run backend flags are set by the test suite's conftest.
      - name: build + test
        working-directory: crates/disponent-python
        run: |
          python -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet --group dev
          .venv/bin/maturin develop --quiet
          .venv/bin/python -m pytest tests/ -q

  ruby:
    name: ruby binding
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # deps live once in crates/disponent-ruby/Gemfile (bundler-cache runs bundle install)
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          working-directory: crates/disponent-ruby
          bundler-cache: true
      # rb_sys drives cargo through extconf/make; bindgen finds the runner's
      # libclang on its own (no LIBCLANG_PATH needed on ubuntu images).
      - name: build + test
        working-directory: crates/disponent-ruby
        env:
          # Build into the workspace target dir so rust-cache covers the deps,
          # in the dev profile — CI tests don't need optimized code.
          RB_SYS_CARGO_PROFILE: dev
          RB_SYS_CARGO_TARGET_DIR: ${{ github.workspace }}/target
        run: |
          bundle exec ruby extconf.rb
          make
          bundle exec ruby -I. -Itest test/test_disponent.rb
